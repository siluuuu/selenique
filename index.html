<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selenique | Luxury Handmade Boutique</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* BRAND COLORS */
            --olive-green: #899c82;
            --pastel-pink: #FFD3E0;
            --pastel-yellow: #FFF9C4;
            --pastel-blue: #E3F2FD;
            --soft-gray: #ECECEC;
            --pure-white: #FFFFFF;
            --text-main: #333333;
            --transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--pure-white);
            color: var(--text-main);
            overflow-x: hidden;
        }

        h1, h2, h3, .brand-title { font-family: 'Playfair Display', serif; font-weight: 400; }

        /* --- NAVIGATION --- */
        nav {
            padding: 50px 20px;
            text-align: center;
            background: var(--pure-white);
        }

        .logo-circle {
            width: 140px;
            height: 140px;
            border: 1px solid var(--olive-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            transition: var(--transition);
        }

        .brand-title {
            font-size: 3rem;
            letter-spacing: 6px;
            color: var(--olive-green);
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 40px;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 25px;
        }

        /* --- HERO SECTION --- */
        .hero {
            display: flex;
            margin: 0 40px 40px 40px;
            height: 80vh;
            background-color: var(--soft-gray);
            border-radius: 50px;
            overflow: hidden;
            animation: fadeIn 1.5s ease;
        }

        .hero-left {
            flex: 1.2;
            /* Placeholder: Replace with home.jpg */
            background: url('home.jpg') center/cover no-repeat;
            background-color: var(--pastel-pink); 
        }

        .hero-right {
            flex: 1;
            padding: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: var(--pure-white);
        }

        .hero-right h1 { font-size: 3.5rem; color: var(--olive-green); margin-bottom: 20px; }

        .btn-luxury {
            padding: 20px 50px;
            background-color: var(--olive-green);
            color: white;
            border-radius: 50px;
            display: inline-block;
            transition: var(--transition);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            width: fit-content;
        }

        .btn-luxury:hover {
            transform: translateY(-5px);
            background-color: var(--text-main);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* --- SHOP GRID --- */
        .shop-section { padding: 100px 40px; }

        .filter-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 80px;
            flex-wrap: wrap;
        }

        .filter-item {
            padding: 10px 30px;
            border: 1px solid var(--soft-gray);
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .filter-item.active { background: var(--olive-green); color: white; border-color: var(--olive-green); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 60px;
        }

        .product-card { cursor: pointer; transition: var(--transition); }
        
        .image-box {
            height: 450px;
            border-radius: 40px;
            overflow: hidden;
            margin-bottom: 25px;
            background-color: var(--soft-gray);
        }

        .product-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 1s ease; }
        .product-card:hover img { transform: scale(1.08); }
        .product-card h3 { text-align: center; font-size: 1.4rem; margin-bottom: 5px; }

        /* --- PRODUCT PAGE OVERLAY --- */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 9999;
            padding: 80px 40px;
            overflow-y: auto;
        }

        .overlay-grid { max-width: 1200px; margin: 0 auto; display: flex; gap: 80px; }
        .close-overlay { position: fixed; top: 40px; right: 40px; font-size: 2.5rem; cursor: pointer; }

        .form-label { display: block; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin: 20px 0 10px; color: var(--olive-green); }
        
        select, input {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--soft-gray);
            border-radius: 20px;
            font-family: inherit;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 1000px) {
            .hero { flex-direction: column; height: auto; margin: 10px; }
            .overlay-grid { flex-direction: column; }
            .brand-title { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-circle">
            <span style="font-family: 'Playfair Display'; font-style: italic; font-size: 2rem;">S</span>
        </div>
        <div class="brand-title">Selenique</div>
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#shop">Collection</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <section class="hero" id="home">
        <div class="hero-left"></div>
        <div class="hero-right">
            <h1>Handmade <br>Masterpieces</h1>
            <p>A luxury boutique for bespoke crochet creations and elegant decor. Crafting memories in Polonnaruwa.</p>
            <br>
            <a href="#shop" class="btn-luxury">Discover More</a>
        </div>
    </section>

    <section class="shop-section" id="shop">
        <div class="filter-container">
            <div class="filter-item active" onclick="filterData('all')">All Designs</div>
            <div class="filter-item" onclick="filterData('flowers')">Flowers</div>
            <div class="filter-item" onclick="filterData('plushies')">Plushies</div>
            <div class="filter-item" onclick="filterData('keychains')">Keychains</div>
            <div class="filter-item" onclick="filterData('decor')">Decor</div>
        </div>

        <div class="grid" id="productGrid"></div>
    </section>

    <div id="productOverlay" class="overlay">
        <span class="close-overlay" onclick="closeBox()">&times;</span>
        <div class="overlay-grid" id="overlayBody"></div>
    </div>

    <script>
        /* --- CHANGE STUFF HERE --- */
        const products = [
            { id: 1, type: 'flowers', name: "Luxe Rose Bouquet", price: "LKR 0.00", desc: "Hand-knitted with the finest luxury wool.", isBouquet: true, img: 'flower1.jpg' },
            { id: 2, type: 'plushies', name: "Velvet Bunny", price: "LKR 0.00", desc: "A soft companion for life's special moments.", isBouquet: false, img: 'flower2.jpg' },
            { id: 3, type: 'keychains', name: "Golden Daisy Charm", price: "LKR 0.00", desc: "Intricate crochet keychain for luxury bags.", isBouquet: false, img: 'flower3.jpg' },
            { id: 4, type: 'decor', name: "Autumn Wall Hanging", price: "LKR 0.00", desc: "Transform your space with handmade art.", isBouquet: false, img: 'decor1.jpg' }
        ];

        function renderProducts(cat = 'all') {
            const container = document.getElementById('productGrid');
            container.innerHTML = '';
            
            const list = cat === 'all' ? products : products.filter(p => p.type === cat);
            
            list.forEach(p => {
                container.innerHTML += `
                    <div class="product-card" onclick="openBox(${p.id})">
                        <div class="image-box">
                            <img src="${p.img}" alt="${p.name}" style="width:100%; height:100%; object-fit:cover;">
                        </div>
                        <h3>${p.name}</h3>
                        <p style="text-align:center; color: var(--olive-green); font-weight:500;">${p.price}</p>
                    </div>
                `;
            });
        }

        function openBox(id) {
            const p = products.find(i => i.id === id);
            const body = document.getElementById('overlayBody');
            
            let extraOptions = '';
            if(p.isBouquet) {
                extraOptions = `
                    <label class="form-label">Number of Flowers</label>
                    <select id="selCount"><option>1</option><option>3</option><option>5</option><option>10</option><option>20</option></select>
                    
                    <label class="form-label">Presentation</label>
                    <select id="selWrap"><option>Wrapped</option><option>Unwrapped</option></select>
                `;
            }

            body.innerHTML = `
                <img src="${p.img}" style="flex:1.2; height: 600px; object-fit: cover; border-radius: 40px;">
                <div style="flex:1">
                    <h1 style="font-size: 3.5rem; color: var(--olive-green);">${p.name}</h1>
                    <p style="margin: 20px 0; color: #666; font-size: 1.1rem;">${p.desc}</p>
                    <p style="font-size: 1.5rem; font-weight: 500; margin-bottom: 30px;">${p.price}</p>

                    <label class="form-label">Size</label>
                    <select id="selSize"><option>Small</option><option>Medium</option><option>Large</option></select>

                    ${extraOptions}

                    <label class="form-label">Quantity</label>
                    <input type="number" id="selQty" value="1" min="1">

                    <button class="btn-luxury" style="width:100%; margin-top:40px;" onclick="checkout('${p.name}')">Order on WhatsApp</button>
                </div>
            `;
            document.getElementById('productOverlay').style.display = 'block';
        }

        function closeBox() { document.getElementById('productOverlay').style.display = 'none'; }

        function filterData(type) {
            document.querySelectorAll('.filter-item').forEach(i => i.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts(type);
        }

        function checkout(name) {
            const qty = document.getElementById('selQty').value;
            const size = document.getElementById('selSize').value;
            const phone = "94XXXXXXXXX"; // REPLACE WITH YOUR NUMBER
            
            let msg = `Hello Selenique! %0AOrder: ${name} %0AQty: ${qty} %0ASize: ${size}`;
            
            if(document.getElementById('selCount')) {
                msg += `%0AFlowers: ${document.getElementById('selCount').value} %0APresentation: ${document.getElementById('selWrap').value}`;
            }

            window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        }

        renderProducts();
    </script>
</body>
</html>
